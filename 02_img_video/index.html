<!DOCTYPE html>
<!-- Declara el tipo de documento. indica el navegador que usara HTML5 -->
<html lang="es">
<!-- Elemento principal del documento HTML. lang="es" indica que el contenido esta en "español" -->

<head> <!-- Sección de configuracion del documento -->
    <meta charset="UtF-8">
    <!-- Define la codificacion de caracteres. UTF-8 Permite usar correctamente tildes, ñ, simbolos, etc. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que el sitio sea responsive. Permite que el diseño se adapte completamente a celulares y tablets. -->
    <title>Practicando HTMl - img y video</title>
    <!-- Titulo del sitio web -->
    <meta name="author" content="Xavier Olmos">
    <!-- Indica quien creo el sitio web -->
    <link rel="stylesheet" href="static/css/style.css">
    <!--Conexión con hoja CSS de estilos-->
</head>

<body>
