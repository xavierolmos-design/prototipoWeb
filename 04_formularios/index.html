<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios HTML</title>
</head>
<body>
    <header>
        <h1>Formularios HTML - Ejemplos</h1>
        <hr>
    </header>
    <main>
        <h2>Formulario de registro</h2>
        <p>Completa los siguientes datos:</p>
        <form><!--Etiquea para crear un formulario-->
            <label>Nombre:</label><!--Etiqueta que describe al campo-->
            <input type="text" name="nombre" placeholder="Ejemplo: Diego Fernández"><!--Campo de texto-->
            <br><br>
            <label>Correo electronico:</label>
            <input type="email" name="correo" placeholder="diego@empresa.cl">
            <br><br>
            <label>Contraseña:</label>
            <input type="password" name="password"><!-- Formato contraseña -->
            <br><br>
            <label>Edad:</label>
            <input type="number" name="Edad"><!-- admite solo numeros -->
            <br><br>
            <label>Fecha de nacimiento:</label>
            <input type="date" name="fechaNac"><!-- Formato fecha -->
            <br><br>
            <label>genero:</label><br>
            <input type="radio" name="genero" value="masculino">Masculino
            <input type="radio" name="genero" value="femenino">Femenino<br><br>
            <label>Intereses:</label><br>
            <input type="checkbox" name="intereses" value="musica">musica<br><!-- Elementos de seleccion multiple -->
            <input type="checkbox" name="intereses" value="deporte">deporte<br> 
            <input type="checkbox" name="intereses" value="películas">películas<br><br>
            <label>Ciudad:</label>
            <select name="Ciudad"><!-- LIsta desplegable de opciones -->
                <option>Santiago</option>
                <option>Valparaiso</option>
                <option>Coquimbo</option>
                <option>Arica</option>
            </select>
            <br><br>
            <label>Comentarios</label><br>
            <textarea name="comentarios" rows="4" cols="30"></textarea><!-- Elemento de texto largo con filas y columnas -->
            <br><br>
            <label>Subir archivo:</label>
            <input type="file" name="Archivo"><!-- Seleccionar un archivo local -->
            <br><br>
            <label>Color favorito:</label><br>
            <input type="color" name="color"><!-- Seleccionar un color -->
            <br><br>
            <label>Nivel de satisfacion:</label><br>
            <input type="range" name="satisfacion" min="1" max="7">
            <input type="submit" value="Enviar"><!-- Boton para enviar -->
            <input type="reset" value="Limpiar"><!-- Boton para limpiar -->
        </form>
        <!-- Creacion de tabla con datos -->
        <h2>Tabla de usuarios</h2>
        <table border="1"><!-- Crear tabla con borde 1 -->
            <tr><!-- Fila de tabla -->
                <th>Nombre</th>
                <th>correo</th>
                <th>Edad</th>
                </tr>
            <tr>
                <td>Catalina</td><!-- Datos de la tabla-->
                <td>catalina@liceovvh.cl</td>
                <td>16</td>
                </tr>
            <tr>
                <td>Fernando</td>
                <td>fernando@gmail.com</td>
                <td>17</td>
        </table>
    </main>
</body>
</html>
